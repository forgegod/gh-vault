name: publish

"on":
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg_version="$(python -c 'import sys; sys.path.insert(0, "src"); from gh_vault import __version__; print(__version__)')"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match gh_vault.__version__ $pkg_version"
            exit 1
          fi
          echo "Tag $tag == package $pkg_version"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1